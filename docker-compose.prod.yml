services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: fshop_backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
