services:
  postgres:
    image: postgres:16-alpine
    container_name: fshop_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_SERVICE_PORT}:5432"
    volumes:
      - fshop_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: fshop_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    container_name: fshop_redis
    restart: always
    ports:
      - "${REDIS_SERVICE_PORT}:6379"
    volumes:
      - fshop_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: fshop_minio
    restart: always
    ports:
      - "${MINIO_SERVICE_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      - fshop_minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  fshop_postgres_data:
  fshop_redis_data:
  fshop_minio_data:
