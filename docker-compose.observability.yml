services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: fshop_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - fshop_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - dora-exporter

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fshop_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - fshop_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.3.2
    container_name: fshop_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - fshop_loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    container_name: fshop_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  dora-exporter:
    image: node:20-alpine
    container_name: fshop_dora_exporter
    restart: unless-stopped
    working_dir: /app
    command: node scripts/dora-exporter.js
    environment:
      DORA_EXPORTER_PORT: 9101
      DORA_WORKFLOW_NAME: ${DORA_WORKFLOW_NAME:-Backend CI/CD}
      DORA_WINDOW_DAYS: ${DORA_WINDOW_DAYS:-7}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "9101:9101"
    volumes:
      - ./scripts/dora-exporter.js:/app/scripts/dora-exporter.js:ro

volumes:
  fshop_prometheus_data:
  fshop_grafana_data:
  fshop_loki_data:
