name: Backend CD Manual

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      run_migration:
        description: Run migration command in release notes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/fshop-be" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare deploy notes artifact
        run: |
          cat > DEPLOY_NOTES.md << 'EOF'
          # Deploy Notes

          Environment: ${{ inputs.environment }}
          Commit: ${{ github.sha }}
          Image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          Migration requested: ${{ inputs.run_migration }}

          ## Manual deploy command template

          1. Pull image:
             docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

          2. Update compose image tag and recreate service:
             docker compose up -d --no-deps --force-recreate backend

          3. Run migration (if enabled):
             npm run migration:run

          ## Required runtime env (set on server, not in repo)

          DATABASE_HOST, DATABASE_PORT, DATABASE_USER, DATABASE_PASSWORD, DATABASE_NAME
          JWT_SECRET, JWT_REFRESH_SECRET, JWT_ACCESS_EXPIRATION, JWT_REFRESH_EXPIRATION_SECONDS
          REDIS_HOST, REDIS_PORT, REDIS_PASSWORD
          CLOUDINARY_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET, CLOUDINARY_FOLDER
          MINIO_ENDPOINT, MINIO_PORT, MINIO_USE_SSL, MINIO_ACCESS_KEY, MINIO_SECRET_KEY, MINIO_BUCKET_NAME
          GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_CALLBACK_URL
          AGORA_APP_ID, AGORA_APP_CERTIFICATE, AGORA_TOKEN_EXPIRE_SECONDS
          FE_URL, AI_SERVER_URL
          EOF

      - name: Upload deploy notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-notes-${{ github.sha }}
          path: DEPLOY_NOTES.md
          if-no-files-found: error
